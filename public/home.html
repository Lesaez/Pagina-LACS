<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inicio - LACS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/main.css">
</head>

<body class="app-page">

<header class="header">
  <div class="header-container">

    <h1 class="logo">LACS</h1>

    <div class="header-user">
      <span id="userEmail"></span>
    </div>

    <div class="header-actions">
      <button onclick="logout()" class="btn btn-primary">
        Cerrar sesión
      </button>
    </div>

  </div>
</header>

<main class="home-main">
  <div class="home-container">

    <button class="home-btn" onclick="window.location.href='reporte-danos.html'">
      <div><strong>Reporte de Daños<br>Laboratorio</strong></div>
    </button>

    <button class="home-btn" onclick="window.location.href='archivo-audiovisual.html'">
      <div><strong>Archivo<br>Audiovisual</strong></div>
    </button>

    <button class="home-btn" onclick="window.location.href='solicitud.html'">
      <div><strong>Solicitud Licencias<br>Uninorte - Dircom</strong></div>
    </button>

    <button class="home-btn" onclick="window.location.href='horas-extra.html'">
      <div><strong>Registro<br>Horas Extra</strong></div>
    </button>

    <button class="home-btn" onclick="window.location.href='index.html'">
      <div><strong>Inventario<br>Activos LACS</strong></div>
    </button>

    <button class="home-btn" onclick="window.location.href='admin-users.html'">
      <div><strong>Administrar<br>Usuarios</strong></div>
    </button>

  </div>
</main>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href = "login.html";
}

document.getElementById("userEmail").textContent = user.email;

function logout(){
  localStorage.removeItem("user");
  window.location.href = "login.html";
}
</script>

</body>
</html>
