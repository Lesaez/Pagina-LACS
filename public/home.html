<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inicio - LACS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/main.css">
</head>

<body>

<header class="header">
  <div class="header-container">

    <h1 class="logo">LACS</h1>

    <!-- USUARIO LOGUEADO -->
    <div class="header-user">
      <span id="userEmail"></span>
    </div>

    <!-- ACCIONES -->
    <div class="header-actions">

      <button onclick="logout()" class="btn btn-primary">
        Cerrar sesión
      </button>

    </div>

  </div>
</header>

<main class="home-main">
  <div class="home-container">

    <!-- ADMIN PANEL -->
    <button
      id="btnAdmin"
      class="btn btn-primary home-btn"
      onclick="window.location.href='admin-users.html'">
      ADMINISTRAR<br>
      USUARIOS
    </button>

    <!-- FILA 1 -->
    <button
      id="btnInventario"
      class="btn btn-primary home-btn"
      onclick="window.location.href='index.html'">
      INVENTARIO ACTIVOS LACS
    </button>

    <button
      class="btn btn-primary home-btn"
      onclick="window.location.href='solicitud.html'">
      SOLICITUD LICENCIAS<br>
      UNINORTE - DIRCOMLACS
    </button>

    <button
      class="btn btn-primary home-btn"
      onclick="window.location.href='horas-extra.html'">
      REGISTRO DE<br>
      HORAS EXTRA LACS
    </button>

    <!-- FILA 2 -->
    <button
      class="btn btn-primary home-btn"
      onclick="window.location.href='archivo-audiovisual.html'">
      UNIDAD DE ARCHIVO<br>
      AUDIOVISUAL
    </button>

    <button
      class="btn btn-primary home-btn"
      onclick="window.location.href='reporte-danos.html'">
      REPORTE DE DAÑOS<br>
      ACTIVOS DEL LABORATORIO
    </button>

  </div>
</main>


<script>

/* ================= OBTENER USUARIO ================= */

const user = JSON.parse(localStorage.getItem("user"));

if(!user){

  /* si no hay sesión volver al login */

  window.location.href = "login.html";

}


/* ================= MOSTRAR EMAIL ================= */

document.getElementById("userEmail").textContent = user.email;


/* ================= CONTROL DE ROLES ================= */

if(user.role !== "admin"){

  document.getElementById("btnAdmin").style.display = "none";

  document.getElementById("btnInventario").style.display = "none";

}


/* ================= LOGOUT ================= */

function logout(){

  localStorage.removeItem("user");

  window.location.href = "login.html";

}

</script>

</body>
</html>
