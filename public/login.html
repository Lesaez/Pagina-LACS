<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Login - LACS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/components/auth.css">

</head>

<body class="register-page">

<div class="container">

<section class="card auth-card">

<h2>Ingreso al sistema LACS</h2>

<form id="loginForm">

<div class="form-grid">

<div class="form-field">
<label>Correo institucional</label>
<input type="email" id="email" required>
</div>

<div class="form-field">
<label>Contraseña</label>

<div class="input-password">
<input type="password" id="password" required>

<button type="button"
class="password-toggle"
onclick="togglePassword(this,'password')">

<img src="assets/assets/eye.png">

</button>
</div>

</div>

</div>

<div class="form-buttons" style="justify-content:center">
<button type="submit" class="btn btn-primary">Ingresar</button>
</div>

</form>

<p style="text-align:center;margin-top:15px">
¿No tienes cuenta? <a href="register.html">Regístrate</a>
</p>

</section>

</div>

<script src="js/auth/auth.js"></script>
<script src="js/login.js"></script>

</body>
</html>
