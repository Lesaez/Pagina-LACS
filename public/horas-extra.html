<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Registro Horas Extra - LACS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">

</head>


<body>

<header class="header">
<div class="header-container">

<h1 class="logo">LACS</h1>

<div class="header-actions">

<button onclick="window.location.href='home.html'" class="btn btn-primary">
Inicio
</button>

</div>

</div>
</header>



<main class="main">

<div class="container">

<section class="solicitud-header">

<h2>REGISTRO DE HORAS EXTRA LACS</h2>

<p>
En este apartado los colaboradores podrán registrar las horas extra realizadas durante sus jornadas laborales.
</p>

</section>



<form id="formHoras">

<!-- DATOS -->

<div class="datos-grid">

<div class="datos-box">

<h3>DATOS DEL TRABAJADOR</h3>

<label>Nombre y Apellidos</label>
<input type="text" id="trabajador">

<label>Documento de Identidad</label>
<input type="text" id="documento">

<label>Centro de Costo</label>
<input type="text" id="centroCosto">

</div>


<div class="datos-box">

<h3>DATOS DE QUIEN AUTORIZA</h3>

<label>Vo.Bo. de quien autoriza</label>
<input type="text" id="autoriza">

<label>Cargo</label>
<input type="text" id="cargo">

</div>

</div>



<!-- TABLA HORAS -->

<h3 style="margin-top:20px">Registro de horas</h3>

<table class="horas-table">

<thead>

<tr>

<th>Fecha</th>
<th>Motivo</th>
<th>Desde</th>
<th>Hasta</th>
<th></th>

</tr>

</thead>

<tbody id="tablaHoras">

<tr>

<td><input type="date"></td>
<td><input type="text"></td>
<td><input type="time"></td>
<td><input type="time"></td>

<td>
<button type="button" class="btn btn-danger eliminarFila">
X
</button>
</td>

</tr>

</tbody>

</table>


<button type="button" id="agregarFila" class="btn btn-primary">
Añadir fila
</button>



<div style="margin-top:30px">

<button type="submit" class="btn btn-primary">
Enviar registro
</button>

</div>


</form>

</div>

</main>



<script>

/* añadir fila */

const tabla = document.getElementById("tablaHoras");

document.getElementById("agregarFila").addEventListener("click", () => {

const fila = tabla.rows[0].cloneNode(true);

fila.querySelectorAll("input").forEach(input => input.value = "");

tabla.appendChild(fila);

});


/* eliminar fila */

document.addEventListener("click", (e) => {

if (e.target.classList.contains("eliminarFila")) {

if (tabla.rows.length > 1) {
e.target.closest("tr").remove();
}

}

});


/* enviar formulario */

document.getElementById("formHoras").addEventListener("submit", async (e) => {

e.preventDefault();

const horas = [];

document.querySelectorAll("#tablaHoras tr").forEach(tr => {

const inputs = tr.querySelectorAll("input");

horas.push({

fecha: inputs[0].value,
motivo: inputs[1].value,
desde: inputs[2].value,
hasta: inputs[3].value

});

});


const data = {

trabajador: document.getElementById("trabajador").value,
documento: document.getElementById("documento").value,
centroCosto: document.getElementById("centroCosto").value,
autoriza: document.getElementById("autoriza").value,
cargo: document.getElementById("cargo").value,

horas

};


const res = await fetch("/api/horas-extra",{

method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)

});

if(res.ok){

alert("Registro enviado correctamente");

}else{

alert("Error enviando correo");

}

});

</script>

</body>
</html>
