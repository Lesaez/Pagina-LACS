<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Registro de Usuario - LACS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/main.css">

</head>

<body>

<header class="header">
<div class="header-container">

<h1 class="logo">LACS</h1>

<div class="header-actions">

<button onclick="window.location.href='home.html'" class="btn btn-primary">
Inicio
</button>

</div>

</div>
</header>


<main class="main">

<div class="container">

<section class="solicitud-header">

<h2>Registro de Usuario</h2>

<p>
Regístrese con su correo institucional para acceder al sistema LACS.
Solo se permiten cuentas con dominio <b>@uninorte.edu.co</b>.
</p>

</section>


<section class="card">

<h3>Crear cuenta</h3>

<form id="formRegister">

<div class="form-grid">


<div class="form-field">

<label>Nombre completo</label>

<input type="text" id="nombre" required>

</div>


<div class="form-field">

<label>Teléfono</label>

<input type="text" id="telefono" required>

</div>


<div class="form-field">

<label>Correo institucional</label>

<input type="email" id="email" required>

</div>


<div class="form-field">

<label>Contraseña</label>

<input type="password" id="password" required>

</div>


</div>


<div class="form-buttons">

<button type="submit" class="btn btn-primary">

Registrarse

</button>

</div>

</form>

</section>

</div>

</main>


<script>

document.getElementById("formRegister").addEventListener("submit", async (e)=>{

e.preventDefault();

const nombre = document.getElementById("nombre").value;
const telefono = document.getElementById("telefono").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;


/* validar correo */

if(!email.endsWith("@uninorte.edu.co")){

alert("Debe usar un correo institucional @uninorte.edu.co");
return;

}


try{

const res = await fetch("/api/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
nombre,
telefono,
email,
password
})

});


if(res.ok){

alert("Usuario registrado correctamente");

window.location.href="login.html";

}else{

alert("Error registrando usuario");

}

}catch(err){

alert("Error de conexión");

}

});

</script>

</body>

</html>
